<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TapVid FM — music for thinking & building</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#8FD71B; --ink:#0A0A0A; --paper:#FFFFFF; --purple:#5B4FFF; --g500:#737373;
    --sans:"Plus Jakarta Sans","PingFang SC","Noto Sans SC",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,"Menlo",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--ink);overflow:hidden;cursor:pointer}
  body{font-family:var(--mono);color:var(--paper)}
  #scene{position:fixed;inset:0;display:block;width:100%;height:100%}
  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(130% 130% at 50% 50%,transparent 46%,rgba(0,0,0,.72) 100%)}
  .nowplaying{position:fixed;top:26px;right:30px;z-index:5;display:flex;align-items:center;gap:12px;
    font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--paper);opacity:.95;user-select:none}
  .eq{display:flex;align-items:flex-end;gap:2px;height:15px;width:18px}
  .eq i{flex:1;background:var(--purple);height:20%;border-radius:1px;transition:height .08s linear}
  .nowplaying .note{color:var(--purple)} .nowplaying b{font-weight:500;color:var(--paper)} .nowplaying .status{color:var(--g500)}
  .wordmark{position:fixed;left:32px;bottom:28px;z-index:5;user-select:none;line-height:1.35}
  .wordmark .mk{font-family:var(--sans);font-weight:800;font-size:20px;letter-spacing:-.01em;color:var(--paper)}
  .wordmark .mk .fm{color:var(--green)}
  .wordmark .sub{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--g500);text-transform:uppercase;margin-top:3px}
  .hint{position:fixed;left:50%;bottom:98px;transform:translateX(-50%);z-index:6;font-family:var(--mono);
    font-size:12px;letter-spacing:.06em;color:var(--g500);text-align:center;transition:opacity .5s ease;user-select:none}
  .hint .k{border:1px solid #34332f;border-radius:4px;padding:1px 6px;color:var(--paper);font-size:11px}
  .hint.playing{opacity:0}
  .pulse{animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.85}}
  .bar{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:7;display:flex;align-items:center;gap:12px;
    padding:9px 16px;background:rgba(18,18,20,.74);border:1px solid #26262a;border-radius:999px;backdrop-filter:blur(8px);
    font-family:var(--mono);user-select:none}
  .bar button{background:none;border:none;color:var(--paper);cursor:pointer;font-size:15px;line-height:1;padding:6px 7px;border-radius:8px;opacity:.82;transition:opacity .15s,background .15s}
  .bar button:hover{opacity:1;background:rgba(255,255,255,.08)}
  .bar .play{color:var(--green);font-size:17px}
  .bar .vol{display:flex;align-items:center;gap:8px;color:var(--g500);font-size:13px}
  .bar input[type=range]{-webkit-appearance:none;appearance:none;width:80px;height:3px;background:#3a3a3e;border-radius:2px;outline:none}
  .bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--green);cursor:pointer}
  .bar input[type=range]::-moz-range-thumb{width:11px;height:11px;border:none;border-radius:50%;background:var(--green);cursor:pointer}
  .bar .sep{width:1px;height:18px;background:#2f2f33}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:7;font-family:var(--mono);font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--green);opacity:0;transition:opacity .3s ease;pointer-events:none}
  .toast.show{opacity:.9}
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="vignette"></div>

  <div class="nowplaying">
    <span class="eq" id="eq"><i></i><i></i><i></i><i></i></span>
    <span><span class="note">&#9834;</span> <b>TapVid&nbsp;FM</b> &nbsp;<span class="status" id="status">— press play</span></span>
  </div>
  <div class="wordmark">
    <div class="mk">TapVid<span class="fm">&nbsp;FM</span></div>
    <div class="sub">music for thinking &amp; building</div>
  </div>
  <div class="hint pulse" id="hint">click anywhere &middot; or press <span class="k">space</span> &mdash; the sound moves the field</div>

  <div class="bar" id="bar">
    <button id="prev" aria-label="previous track">&#9198;</button>
    <button class="play" id="play" aria-label="play / pause">&#9654;</button>
    <button id="next" aria-label="next track">&#9197;</button>
    <span class="sep"></span>
    <span class="vol"><span aria-hidden="true">&#9834;</span><input type="range" id="vol" min="0" max="100" value="80" aria-label="volume" /></span>
    <span class="sep"></span>
    <button id="full" aria-label="toggle fullscreen">&#9974;</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
/* ===========================================================================
   TapVid FM — audio-reactive flow field (WebGL2)
   Technique ported from "Not Safe" by ZRNOF (openprocessing.org/sketch/2956548),
   a recode in the #RecodeRethink curation, inspired by Etienne Jacob (bleuje.com).
   GLSL noise: 4D simplex by Ian McEwan / Ashima Arts / stegu (MIT);
   snoise4DImage + displace by Zaron (MIT) — license headers kept in the shader.
   The field is driven by the audio's frequency spectrum + waveform.
   =========================================================================== */
var canvas=document.getElementById('scene');
var gl=canvas.getContext('webgl2',{preserveDrawingBuffer:true, alpha:false, antialias:false, premultipliedAlpha:false});

/* ---------- GLSL ---------- */
var SNOISE4D=`
// 4D simplex noise — Ian McEwan, Ashima Arts, stegu. Distributed under the MIT License.
// https://github.com/ashima/webgl-noise  https://github.com/stegu/webgl-noise
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
float mod289(float x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+10.0)*x);}
float permute(float x){return mod289(((x*34.0)+10.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float taylorInvSqrt(float r){return 1.79284291400159-0.85373472095314*r;}
vec4 grad4(float j, vec4 ip){
  const vec4 ones=vec4(1.0,1.0,1.0,-1.0); vec4 p,s;
  p.xyz=floor(fract(vec3(j)*ip.xyz)*7.0)*ip.z-1.0;
  p.w=1.5-dot(abs(p.xyz),ones.xyz);
  s=vec4(lessThan(p,vec4(0.0)));
  p.xyz=p.xyz+(s.xyz*2.0-1.0)*s.www;
  return p;
}
#define F4 0.309016994374947451
float snoise(vec4 v){
  const vec4 C=vec4(0.138196601125011,0.276393202250021,0.414589803375032,-0.447213595499958);
  vec4 i=floor(v+dot(v,vec4(F4)));
  vec4 x0=v-i+dot(i,C.xxxx);
  vec4 i0; vec3 isX=step(x0.yzw,x0.xxx); vec3 isYZ=step(x0.zww,x0.yyz);
  i0.x=isX.x+isX.y+isX.z; i0.yzw=1.0-isX;
  i0.y+=isYZ.x+isYZ.y; i0.zw+=1.0-isYZ.xy; i0.z+=isYZ.z; i0.w+=1.0-isYZ.z;
  vec4 i3=clamp(i0,0.0,1.0); vec4 i2=clamp(i0-1.0,0.0,1.0); vec4 i1=clamp(i0-2.0,0.0,1.0);
  vec4 x1=x0-i1+C.xxxx; vec4 x2=x0-i2+C.yyyy; vec4 x3=x0-i3+C.zzzz; vec4 x4=x0+C.wwww;
  i=mod289(i);
  float j0=permute(permute(permute(permute(i.w)+i.z)+i.y)+i.x);
  vec4 j1=permute(permute(permute(permute(i.w+vec4(i1.w,i2.w,i3.w,1.0))+i.z+vec4(i1.z,i2.z,i3.z,1.0))+i.y+vec4(i1.y,i2.y,i3.y,1.0))+i.x+vec4(i1.x,i2.x,i3.x,1.0));
  vec4 ip=vec4(1.0/294.0,1.0/49.0,1.0/7.0,0.0);
  vec4 p0=grad4(j0,ip); vec4 p1=grad4(j1.x,ip); vec4 p2=grad4(j1.y,ip); vec4 p3=grad4(j1.z,ip); vec4 p4=grad4(j1.w,ip);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w; p4*=taylorInvSqrt(dot(p4,p4));
  vec3 m0=max(0.6-vec3(dot(x0,x0),dot(x1,x1),dot(x2,x2)),0.0);
  vec2 m1=max(0.6-vec2(dot(x3,x3),dot(x4,x4)),0.0);
  m0=m0*m0; m1=m1*m1;
  return 49.0*(dot(m0*m0,vec3(dot(p0,x0),dot(p1,x1),dot(p2,x2)))+dot(m1*m1,vec2(dot(p3,x3),dot(p4,x4))));
}`;
var SNOISE_IMG=`
// MIT License — Copyright (c) 2023 Zaron
vec4 snoise4DImage(vec2 uv, float scal, float gain, float ofst, vec4 move){
  uv*=scal;
  float R=snoise(vec4(uv,100.,200.)+move);
  float G=snoise(vec4(uv,300.,400.)+move);
  float B=snoise(vec4(uv,500.,600.)+move);
  return vec4(ofst+gain*vec3(R,G,B),1.);
}`;
var DISPLACE=`
// MIT License — Copyright (c) 2023 Zaron
vec2 displace(vec2 uv, vec2 duv, float off, float wei){ duv-=off; return uv-duv*wei; }`;

var VERT=`#version 300 es
in vec2 aPosition;
uniform float uTime; uniform vec2 uRandom; uniform float uLevel; uniform float uBass; uniform float uAspect;
uniform sampler2D uFreq; uniform sampler2D uWave;
`+SNOISE4D+SNOISE_IMG+DISPLACE+`
vec2 fbm(vec2 uv, float scal, float gain, float ofst, vec4 move){
  vec4 n;
  n  =    1.0*snoise4DImage((uv-vec2(421.,132.))*1.0, scal, gain, ofst, move);
  n +=    0.5*snoise4DImage((uv-vec2(913.,687.))*2.0, scal, gain, ofst, move);
  n +=   0.25*snoise4DImage((uv-vec2(834.,724.))*4.0, scal, gain, ofst, move);
  n +=  0.125*snoise4DImage((uv-vec2(125.,209.))*8.0, scal, gain, ofst, move);
  n /= 1.875;
  return n.rg;
}
out float vBright; out float vFreqX;
void main(){
  vec2 pos=aPosition;
  vec2 ap=vec2(pos.x*uAspect, pos.y);                 // aspect-correct so the field stays round
  float xN=pos.x*0.5+0.5;
  float fAmp=texture(uFreq, vec2(xN,0.5)).r;          // spectrum at this column
  float wv=texture(uWave, vec2(xN,0.5)).r*2.0-1.0;    // waveform at this column
  float circle=smoothstep(1.0, 0.0, length(ap));
  vec4 move=vec4(vec2(0.0), vec2(cos(uTime*0.5), sin(uTime*0.5))+uRandom);
  vec2 n=fbm(ap, 2.0, 5.0, 0.5, move)*circle;
  float wei=0.2*circle*(1.0 + uLevel*1.7 + fAmp*1.3); // displacement strength tracks loudness/frequency
  vec2 dpos=displace(pos, n, 0.5, wei);
  dpos+=vec2(-n.y, n.x)*wv*0.07*uLevel;               // waveform ripple, perpendicular to the flow
  vBright=clamp(length(n)*(0.55+uLevel*1.3)+fAmp*0.55, 0.0, 1.5);
  vFreqX=fAmp;
  gl_Position=vec4(dpos, 0.0, 1.0);
  gl_PointSize=1.0+uLevel*1.6;
}`;
var FRAG=`#version 300 es
precision mediump float;
in float vBright; in float vFreqX;
uniform vec3 uGreen; uniform vec3 uPurple;
out vec4 fragColor;
void main(){
  vec3 col=mix(uGreen, uPurple, clamp(vFreqX*1.25,0.0,1.0));
  float a=clamp(vBright,0.0,1.0)*0.5;
  fragColor=vec4(col*a, a);
}`;
var FADE_V=`#version 300 es
const vec2 P[3]=vec2[3](vec2(-1.,-1.),vec2(3.,-1.),vec2(-1.,3.));
void main(){ gl_Position=vec4(P[gl_VertexID],0.,1.); }`;
var FADE_F=`#version 300 es
precision mediump float; uniform float uFade; out vec4 c;
void main(){ c=vec4(0.,0.,0.,uFade); }`;

/* ---------- GL helpers ---------- */
function sh(type,src){ var s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
function prog(v,f){ var p=gl.createProgram(); gl.attachShader(p,sh(gl.VERTEX_SHADER,v)); gl.attachShader(p,sh(gl.FRAGMENT_SHADER,f));
  gl.linkProgram(p); if(!gl.getProgramParameter(p,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p)); return p; }

var pPoints, pFade, vao, posBuf, freqTex, waveTex, count=0, uLoc={};
function makeTex(){ var t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE); return t; }
function upTex(t,data){ gl.bindTexture(gl.TEXTURE_2D,t); gl.pixelStorei(gl.UNPACK_ALIGNMENT,1);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.R8,data.length,1,0,gl.RED,gl.UNSIGNED_BYTE,data); }

function glInit(){
  pPoints=prog(VERT,FRAG); pFade=prog(FADE_V,FADE_F);
  vao=gl.createVertexArray(); gl.bindVertexArray(vao);
  posBuf=gl.createBuffer();
  var loc=gl.getAttribLocation(pPoints,'aPosition');
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  ['uTime','uRandom','uLevel','uBass','uAspect','uFreq','uWave','uGreen','uPurple'].forEach(function(n){ uLoc[n]=gl.getUniformLocation(pPoints,n); });
  uLoc.uFade=gl.getUniformLocation(pFade,'uFade');
  freqTex=makeTex(); waveTex=makeTex();
  gl.disable(gl.DEPTH_TEST); gl.enable(gl.BLEND);
}
var uRandom=[Math.random()*300, Math.random()*300];

var presets=[{name:'flow',sp:3.0,fade:1,speed:1},{name:'calm',sp:4.2,fade:0.6,speed:0.72},{name:'storm',sp:2.2,fade:1.7,speed:1.4}];
var pi=0, DPR=Math.min(2, window.devicePixelRatio||1), aspect=1, fieldTime=0;
function buildGrid(){
  var W=canvas.width=Math.floor(innerWidth*DPR), H=canvas.height=Math.floor(innerHeight*DPR);
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  gl.viewport(0,0,W,H); aspect=W/H;
  var sp=presets[pi].sp*DPR;
  var cols=Math.max(2,Math.floor(W/sp)), rows=Math.max(2,Math.floor(H/sp));
  while(cols*rows>360000){ sp*=1.12; cols=Math.max(2,Math.floor(W/sp)); rows=Math.max(2,Math.floor(H/sp)); }
  var pos=new Float32Array(cols*rows*2), k=0;
  for(var x=0;x<cols;x++) for(var y=0;y<rows;y++){ pos[k++]=(x/(cols-1))*2-1; pos[k++]=(y/(rows-1))*2-1; }
  count=cols*rows;
  gl.bindVertexArray(vao); gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.bufferData(gl.ARRAY_BUFFER,pos,gl.STATIC_DRAW);
}

function render(A){
  gl.bindVertexArray(vao);
  /* fade previous frame -> trails (longer when louder) */
  gl.useProgram(pFade); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.uniform1f(uLoc.uFade, Math.max(0.04,(0.12-A.level*0.06)*presets[pi].fade));
  gl.drawArrays(gl.TRIANGLES,0,3);
  /* draw the displaced point field, additively */
  gl.useProgram(pPoints); gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  fieldTime += (0.006 + A.level*0.03)*presets[pi].speed;
  gl.uniform1f(uLoc.uTime, fieldTime);
  gl.uniform2f(uLoc.uRandom, uRandom[0], uRandom[1]);
  gl.uniform1f(uLoc.uLevel, A.level);
  gl.uniform1f(uLoc.uBass, A.bass||A.level);
  gl.uniform1f(uLoc.uAspect, aspect>=1?aspect:1.0);
  gl.uniform3f(uLoc.uGreen, 0.561,0.843,0.106);
  gl.uniform3f(uLoc.uPurple, 0.357,0.310,1.0);
  gl.activeTexture(gl.TEXTURE0); upTex(freqTex, A.freq); gl.uniform1i(uLoc.uFreq,0);
  gl.activeTexture(gl.TEXTURE1); upTex(waveTex, A.wave); gl.uniform1i(uLoc.uWave,1);
  gl.drawArrays(gl.POINTS,0,count);
}

/* ---------- procedural lofi engine (fallback) ---------- */
function LofiFM(){
  this.ac=null;this.playing=false;this.bl=60/72;this.bar=0;this.next=0;this.last=0;this.timer=null;
  this.prog=[{c:[62,65,69,72],b:38},{c:[55,59,62,65],b:43},{c:[60,64,67,71],b:36},{c:[57,60,64,67],b:45}];
  this.pent=[72,74,76,79,81,84];
}
LofiFM.prototype.m2f=function(m){return 440*Math.pow(2,(m-69)/12);};
LofiFM.prototype.init=function(){
  if(this.ac)return; var A=window.AudioContext||window.webkitAudioContext; this.ac=new A();
  this.master=this.ac.createGain(); this.master.gain.value=0;
  this.lp=this.ac.createBiquadFilter(); this.lp.type='lowpass'; this.lp.frequency.value=2600;
  this.rv=this.ac.createConvolver(); this.rv.buffer=this.imp(2.4,2.5);
  this.wet=this.ac.createGain(); this.wet.gain.value=0.3; this.dry=this.ac.createGain(); this.dry.gain.value=0.85;
  this.an=this.ac.createAnalyser(); this.an.fftSize=512; this.fd=new Uint8Array(this.an.frequencyBinCount); this.wfd=new Uint8Array(this.an.fftSize);
  this.lp.connect(this.dry); this.lp.connect(this.rv); this.rv.connect(this.wet);
  this.dry.connect(this.master); this.wet.connect(this.master); this.master.connect(this.an); this.an.connect(this.ac.destination);
  this.vinyl();
};
LofiFM.prototype.imp=function(d,dc){var r=this.ac.sampleRate,n=r*d,b=this.ac.createBuffer(2,n,r);
  for(var c=0;c<2;c++){var ch=b.getChannelData(c);for(var i=0;i<n;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/n,dc);}return b;};
LofiFM.prototype.vinyl=function(){var r=this.ac.sampleRate,b=this.ac.createBuffer(1,r*2,r),d=b.getChannelData(0);
  for(var i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*0.5;if(Math.random()>0.9985)d[i]=Math.random()*2-1;}
  var s=this.ac.createBufferSource();s.buffer=b;s.loop=true;var hp=this.ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=1500;
  var g=this.ac.createGain();g.gain.value=0.016;s.connect(hp);hp.connect(g);g.connect(this.master);s.start();};
LofiFM.prototype.voice=function(f,t,dur,o){o=o||{};var os=this.ac.createOscillator();os.type=o.type||'sine';os.frequency.value=f;os.detune.value=o.detune||0;
  var g=this.ac.createGain(),ga=o.gain||0.12,at=o.atk||0.02,rl=o.rel||0.3;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(ga,t+at);g.gain.setValueAtTime(ga,t+Math.max(at,dur-rl));
  g.gain.linearRampToValueAtTime(0.0001,t+dur);os.connect(g);g.connect(this.lp);os.start(t);os.stop(t+dur+0.05);};
LofiFM.prototype.barFn=function(t){var ch=this.prog[this.bar%4],be=this.bl,bn=be*4;
  for(var i=0;i<ch.c.length;i++){var f=this.m2f(ch.c[i]);
    this.voice(f,t,bn+0.6,{type:'triangle',gain:0.05,atk:0.9,rel:1.2,detune:-4});this.voice(f,t,bn+0.6,{type:'sine',gain:0.04,atk:1.1,rel:1.2,detune:5});}
  this.voice(this.m2f(ch.b),t,be*2-0.05,{gain:0.16,atk:0.04});this.voice(this.m2f(ch.b),t+be*2,be*2-0.05,{gain:0.13,atk:0.04});
  for(var b=0;b<4;b++)if(Math.random()<0.42){var n=this.pent[(Math.random()*6)|0],tt=t+b*be+(Math.random()<0.3?be*0.5:0);
    this.voice(this.m2f(n),tt,be*0.9,{type:'triangle',gain:0.07,rel:0.4,detune:3});this.voice(this.m2f(n)*2,tt,be*0.6,{gain:0.02});}
  this.bar++;};
LofiFM.prototype.loop=function(){while(this.next<this.ac.currentTime+0.2){this.barFn(this.next);this.next+=this.bl*4;}};
LofiFM.prototype.start=function(){this.init();if(this.ac.state==='suspended')this.ac.resume();this.playing=true;
  this.master.gain.cancelScheduledValues(this.ac.currentTime);this.master.gain.linearRampToValueAtTime(0.9,this.ac.currentTime+1.2);
  this.next=this.ac.currentTime+0.15;this.last=this.ac.currentTime;this.loop();var self=this;
  this.timer=setInterval(function(){self.loop();while(self.ac.currentTime-self.last>=self.bl)self.last+=self.bl;},25);};
LofiFM.prototype.pause=function(){if(!this.ac)return;this.playing=false;this.master.gain.linearRampToValueAtTime(0.0001,this.ac.currentTime+0.6);clearInterval(this.timer);};

/* ---------- playlist (drop CC0 / public-domain files into ./audio) ---------- */
var PLAYLIST=[
  {title:'Nocturne Op.9 No.2',            artist:'Chopin · Musopen (CC0)',        src:'audio/chopin-nocturne-op9-2.mp3'},
  {title:'Prélude Op.28 No.15 (Raindrop)', artist:'Chopin · Musopen (CC0)',      src:'audio/chopin-raindrop.mp3'},
  {title:'Cello Suite No.1 — Prélude', artist:'Bach · M. Fontana (CC BY-NC-ND)', src:'audio/bach-cello-suite1-prelude.mp3'}
];

var lofi=new LofiFM();
var hint=document.getElementById('hint'), statusEl=document.getElementById('status'), eq=[].slice.call(document.querySelectorAll('#eq i'));
var playBtn=document.getElementById('play');
function perfnow(){ return (typeof performance!=='undefined'?performance.now():0); }

var Player={
  mode: PLAYLIST.length? 'track':'lofi', playing:false, idx:0, vol:0.8, everPlayed:false, ac:null, an:null, useGraph:false,
  fd:new Uint8Array(256), wfd:new Uint8Array(512),
  initAudio:function(){
    if(this.audio) return; var self=this;
    this.audio=new Audio(); this.audio.preload='auto'; this.audio.volume=this.vol;
    this.audio.addEventListener('ended',function(){ self.next(); });
    this.audio.addEventListener('error',function(){ self.fail(); });
    this.audio.addEventListener('playing',function(){ self.everPlayed=true; });
    this.useGraph = (location.protocol==='http:'||location.protocol==='https:');
    if(this.useGraph){
      try{
        var A=window.AudioContext||window.webkitAudioContext; this.ac=new A();
        this.gain=this.ac.createGain(); this.gain.gain.value=this.vol;
        this.an=this.ac.createAnalyser(); this.an.fftSize=1024;
        this.fd=new Uint8Array(this.an.frequencyBinCount); this.wfd=new Uint8Array(this.an.fftSize);
        this.msrc=this.ac.createMediaElementSource(this.audio);
        this.msrc.connect(this.gain); this.gain.connect(this.an); this.an.connect(this.ac.destination);
      }catch(e){ this.useGraph=false; this.ac=null; this.an=null; }
    }
    this.load(this.idx);
  },
  load:function(i){ this.idx=(i+PLAYLIST.length)%PLAYLIST.length; if(this.audio) this.audio.src=PLAYLIST[this.idx].src; updateNow(); },
  play:function(){
    if(this.mode==='lofi'){ lofi.start(); this.playing=true; updateNow(); return; }
    this.initAudio(); if(this.ac && this.ac.state==='suspended') this.ac.resume();
    var pr=this.audio.play(); if(pr&&pr.catch) pr.catch(function(){});
    this.playing=true; updateNow();
  },
  pause:function(){ if(this.mode==='lofi') lofi.pause(); else if(this.audio) this.audio.pause(); this.playing=false; updateNow(); },
  toggle:function(){ this.playing? this.pause() : this.play(); },
  goto:function(d){
    if(!PLAYLIST.length) return;
    if(lofi.playing) lofi.pause();
    this.mode='track'; this.initAudio();
    if(this.ac && this.ac.state==='suspended') this.ac.resume();
    this.load(this.idx + d);
    var p=this.audio.play(); if(p&&p.catch) p.catch(function(){});
    this.playing=true; updateNow();
  },
  next:function(){ this.goto(1); },
  prev:function(){ this.goto(-1); },
  setVol:function(v){ this.vol=v; if(this.gain) this.gain.gain.value=v; else if(this.audio) this.audio.volume=v; },
  fail:function(){ if(this.mode==='track' && !this.everPlayed){ this.mode='lofi'; if(this.playing) lofi.start(); updateNow(); } },
  /* unified audio snapshot for the field: {level, bass, freq, wave} */
  snap:function(){
    var i,s,bs;
    if(this.mode==='lofi' && lofi.an){
      lofi.an.getByteFrequencyData(lofi.fd); lofi.an.getByteTimeDomainData(lofi.wfd);
      s=0; for(i=0;i<16;i++) s+=lofi.fd[i]; bs=0; for(i=0;i<5;i++) bs+=lofi.fd[i];
      return {level:Math.min(1,s/(16*200)), bass:Math.min(1,bs/(5*210)), freq:lofi.fd, wave:lofi.wfd};
    }
    if(this.an && this.playing){
      this.an.getByteFrequencyData(this.fd); this.an.getByteTimeDomainData(this.wfd);
      s=0; for(i=0;i<48;i++) s+=this.fd[i]; bs=0; for(i=0;i<8;i++) bs+=this.fd[i];
      return {level:Math.min(1,s/(48*210)), bass:Math.min(1,bs/(8*220)), freq:this.fd, wave:this.wfd};
    }
    if(this.playing) return this.synAudio();
    if(!this._zf){ this._zf=new Uint8Array(64); this._zw=new Uint8Array(64); for(i=0;i<64;i++) this._zw[i]=128; }
    return {level:0, bass:0, freq:this._zf, wave:this._zw};
  },
  synAudio:function(){
    var n=perfnow()*0.001;
    var lv=Math.max(0.12,Math.min(1,0.45+0.22*Math.sin(n*2.1)+0.12*Math.sin(n*5.3)+0.06*Math.sin(n*11.0)));
    if(!this._sf){ this._sf=new Uint8Array(256); this._sw=new Uint8Array(256); }
    var f=this._sf, w=this._sw, i;
    for(i=0;i<256;i++){ var e=Math.exp(-i/70); f[i]=Math.max(0,Math.min(255, lv*e*(0.55+0.45*Math.sin(n*3+i*0.08))*255)); }
    for(i=0;i<256;i++){ w[i]=Math.max(0,Math.min(255, 128+(Math.sin(i*0.10+n*6)*55+Math.sin(i*0.021-n*4)*28)*lv)); }
    return {level:lv, bass:lv*0.9, freq:f, wave:w};
  },
  title:function(){ if(this.mode==='lofi') return 'lofi · generated companion'; var x=PLAYLIST[this.idx]; return x? x.title+'  ·  '+x.artist : 'no track'; }
};

function updateNow(){ statusEl.textContent='— '+Player.title(); playBtn.innerHTML=Player.playing?'&#9208;':'&#9654;'; hint.className=Player.playing?'hint playing':'hint pulse'; }

/* ---------- controls ---------- */
function toggle(){ Player.toggle(); }
function stop(e){ e.stopPropagation(); }
document.getElementById('play').addEventListener('click',function(e){ stop(e); toggle(); });
document.getElementById('prev').addEventListener('click',function(e){ stop(e); Player.prev(); });
document.getElementById('next').addEventListener('click',function(e){ stop(e); Player.next(); });
document.getElementById('vol').addEventListener('input',function(e){ stop(e); Player.setVol(this.value/100); });
document.getElementById('bar').addEventListener('click',stop);
document.getElementById('full').addEventListener('click',function(e){ stop(e);
  var el=document.documentElement;
  if(!document.fullscreenElement && !document.webkitFullscreenElement){ (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  else { (document.exitFullscreen||document.webkitExitFullscreen).call(document); } });
addEventListener('click',toggle);
addEventListener('keydown',function(e){
  if(e.code==='Space'){ e.preventDefault(); toggle(); }
  else if(e.code==='ArrowRight'){ Player.next(); }
  else if(e.code==='ArrowLeft'){ Player.prev(); }
  else if(e.code==='KeyF'){ cyclePreset(); } });

var toast=document.getElementById('toast'), toastT=0;
function cyclePreset(){
  pi=(pi+1)%presets.length; buildGrid();
  toast.textContent='field · '+presets[pi].name;
  toast.className='toast show';
  clearTimeout(toastT); toastT=setTimeout(function(){ toast.className='toast'; }, 1300);
}
updateNow();

/* ---------- render loop ---------- */
function frame(){
  var A=Player.snap();
  render(A);
  if(Player.playing){ eq.forEach(function(b,i){ b.style.height=(15+(A.freq[2+i*4]||0)/255*85)+'%'; }); }
  else eq.forEach(function(b,i){ b.style.height=(15+8*Math.abs(Math.sin(perfnow()*0.003+i)))+'%'; });
  requestAnimationFrame(frame);
}

if(!gl){
  document.body.insertAdjacentHTML('beforeend','<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#737373;font-family:monospace;font-size:13px">WebGL2 not available in this browser.</div>');
} else {
  glInit(); buildGrid(); addEventListener('resize',buildGrid); requestAnimationFrame(frame);
}
</script>
</body>
</html>
